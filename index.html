<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4 text-center">Tasks for Completion</h2>

            <div class="card mb-4">
                <div class="card-body" style="background-color: #deeaf7;">
                    <form id="task-form">
                        
                        <div class="mb-3">
                            <label for="task-title" class="form-label">Task Title:</label>
                            <input type="text" class="form-control" id="task-title" required>
                        </div>

                        <div class="mb-3">
                            <label for="task-priority" class="form-label">Task Priority:</label>
                            <select class="form-select" id="task-priority" required>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Task Status</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="task-status" id="status-pending" value="pending" checked>
                                <label class="form-check-label" for="status-pending">Pending</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="task-status" id="status-completed" value="completed">
                                <label class="form-check-label" for="status-completed">Completed</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Add Task</button>
                    </form>
                </div>
            </div>

            <ul id="task-list" class="list-group">
                </ul>

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
